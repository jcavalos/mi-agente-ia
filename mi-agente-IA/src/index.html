<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVALOS — Soporte IT</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a1d2e;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid #2d3748;
  }
  header h1 { font-size: 1.3rem; color: #63b3ed; }
  header span { font-size: 0.8rem; color: #718096; }
  .status { 
    width: 8px; height: 8px; 
    background: #48bb78; 
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #user-bar {
    background: #1a1d2e;
    padding: 8px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid #2d3748;
    font-size: 0.85rem;
  }
  #user-bar input {
    background: #2d3748;
    border: 1px solid #4a5568;
    color: #e2e8f0;
    padding: 4px 10px;
    border-radius: 6px;
    width: 160px;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 0.9rem;
    white-space: pre-wrap;
  }
  .msg.user {
    background: #2b6cb0;
    align-self: flex-end;
    border-radius: 12px 12px 2px 12px;
  }
  .msg.bot {
    background: #1a202c;
    border: 1px solid #2d3748;
    align-self: flex-start;
    border-radius: 12px 12px 12px 2px;
  }
  .msg.sistema {
    background: #22543d;
    align-self: center;
    font-size: 0.8rem;
    padding: 6px 14px;
  }
  .msg-meta {
    font-size: 0.72rem;
    color: #718096;
    margin-top: 4px;
  }
  .typing {
    background: #1a202c;
    border: 1px solid #2d3748;
    align-self: flex-start;
    padding: 12px 20px;
    border-radius: 12px;
  }
  .typing span {
    display: inline-block;
    width: 8px; height: 8px;
    background: #63b3ed;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  #input-area {
    background: #1a1d2e;
    padding: 16px 24px;
    border-top: 1px solid #2d3748;
    display: flex;
    gap: 10px;
  }
  #input {
    flex: 1;
    background: #2d3748;
    border: 1px solid #4a5568;
    color: #e2e8f0;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 0.95rem;
    resize: none;
    height: 48px;
    max-height: 140px;
    overflow-y: auto;
  }
  #input:focus { outline: none; border-color: #63b3ed; }
  button {
    background: #2b6cb0;
    color: white;
    border: none;
    padding: 0 20px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: background 0.2s;
  }
  button:hover { background: #2c5282; }
  button:disabled { background: #4a5568; cursor: not-allowed; }
  #acciones {
    background: #1a1d2e;
    padding: 8px 24px;
    display: flex;
    gap: 8px;
    border-top: 1px solid #2d3748;
    flex-wrap: wrap;
  }
  .btn-accion {
    background: #2d3748;
    color: #a0aec0;
    border: 1px solid #4a5568;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
    transition: all 0.2s;
  }
  .btn-accion:hover { background: #4a5568; color: #e2e8f0; }
  label.upload-btn {
    background: #2d3748;
    color: #a0aec0;
    border: 1px solid #4a5568;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.78rem;
  }
  label.upload-btn:hover { background: #4a5568; }
  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <div class="status"></div>
  <h1>⚡ AVALOS</h1>
  <span>Asistente IT & Desarrollo</span>
</header>

<div id="user-bar">
  <span>Usuario:</span>
  <input type="text" id="usuario-id" value="usuario1" placeholder="tu nombre o ID">
  <span style="color:#718096; margin-left:8px;">Sesión independiente por usuario</span>
</div>

<div id="chat">
  <div class="msg sistema">
    👋 AVALOS activo — RAG habilitado con documentos internos
  </div>
</div>

<div id="acciones">
  <button class="btn-accion" onclick="enviarRapido('¿qué documentos tienes indexados?')">📊 Estado BD</button>
  <button class="btn-accion" onclick="enviarRapido('genera un reporte del sistema')">🖥️ Reporte sistema</button>
  <button class="btn-accion" onclick="enviarRapido('muestra el historial de conversación')">📋 Historial</button>
  <button class="btn-accion" onclick="indexar()">🔄 Re-indexar docs</button>
  <label class="upload-btn" for="file-input">📎 Subir documento</label>
  <input type="file" id="file-input" onchange="subirArchivo(this)">
</div>

<div id="input-area">
  <textarea id="input" 
    placeholder="Describe tu problema o pregunta... (Enter para enviar, Shift+Enter para nueva línea)"
    onkeydown="manejarTecla(event)"></textarea>
  <button id="btn-enviar" onclick="enviar()">➤</button>
</div>

<script>
const API = "http://127.0.0.1:8000";  

async function enviar() {
  const input = document.getElementById("input");
  const texto = input.value.trim();
  if (!texto) return;

  const userId = document.getElementById("usuario-id").value || "default";
  input.value = "";
  input.style.height = "48px";

  agregarMensaje(texto, "user");
  const typing = mostrarTyping();
  document.getElementById("btn-enviar").disabled = true;

  try {
    const res = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mensaje: texto, usuario_id: userId })
    });
    const data = await res.json();
    quitarTyping(typing);
    agregarMensaje(data.respuesta, "bot", data.timestamp);
  } catch (e) {
    quitarTyping(typing);
    agregarMensaje(`❌ Error de conexión: ${e.message}`, "sistema");
  }
  document.getElementById("btn-enviar").disabled = false;
}

async function enviarRapido(texto) {
  document.getElementById("input").value = texto;
  await enviar();
}

async function indexar() {
  agregarMensaje("🔄 Re-indexando documentos...", "sistema");
  try {
    const res = await fetch(`${API}/indexar`, { method: "POST" });
    const data = await res.json();
    agregarMensaje(data.resultado, "sistema");
  } catch (e) {
    agregarMensaje(`❌ Error: ${e.message}`, "sistema");
  }
}

async function subirArchivo(input) {
  const archivo = input.files[0];
  if (!archivo) return;

  const ext = archivo.name.split(".").pop().toLowerCase();
  const tipoMap = { pdf: "pdf", eml: "correo", log: "ticket",
                    json: "ticket", py: "codigo", js: "codigo" };
  const tipo = tipoMap[ext] || "auto";

  const fd = new FormData();
  fd.append("archivo", archivo);
  fd.append("tipo", tipo);

  agregarMensaje(`📎 Subiendo: ${archivo.name}...`, "sistema");
  try {
    const res = await fetch(`${API}/subir-documento`, { method: "POST", body: fd });
    const data = await res.json();
    agregarMensaje(data.mensaje + "\n" + data.siguiente, "sistema");
  } catch (e) {
    agregarMensaje(`❌ Error: ${e.message}`, "sistema");
  }
  input.value = "";
}

function agregarMensaje(texto, tipo, timestamp) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `msg ${tipo}`;
  div.textContent = texto;
  if (timestamp) {
    const meta = document.createElement("div");
    meta.className = "msg-meta";
    meta.textContent = new Date(timestamp).toLocaleTimeString("es-MX");
    div.appendChild(meta);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function mostrarTyping() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "typing";
  div.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function quitarTyping(el) { el.remove(); }

function manejarTecla(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    enviar();
  }
  // auto-resize
  const input = e.target;
  input.style.height = "48px";
  input.style.height = Math.min(input.scrollHeight, 140) + "px";
}
</script>
</body>
</html>
